name: Build wheels

on:
  push:
    branches: [main, "claude/**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write  # needed to attach wheels to a Release on tag push

jobs:
  linux-x86_64:
    name: linux-x86_64 (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build manylinux wheel
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64-unknown-linux-gnu
          manylinux: "2_28"
          args: --release --out dist --interpreter python${{ matrix.python-version }}
          # maturin reads pyproject.toml at the repo root, which points at
          # crates/whisperx_ext/Cargo.toml via [tool.maturin].

      - name: Smoke-test the wheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy
          python -m pip install --force-reinstall --no-deps dist/whisperx-*.whl
          python -c "from whisperx_ext.alignment import align_segment; print('import ok')"

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-linux-x86_64-py${{ matrix.python-version }}
          path: dist/*.whl
          if-no-files-found: error

  macos-arm64:
    name: macos-arm64 (py${{ matrix.python-version }})
    runs-on: macos-14  # Apple Silicon runner
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build macOS arm64 wheel
        uses: PyO3/maturin-action@v1
        with:
          target: aarch64-apple-darwin
          args: --release --out dist --interpreter python${{ matrix.python-version }}

      - name: Smoke-test the wheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy
          python -m pip install --force-reinstall --no-deps dist/whisperx-*.whl
          python -c "from whisperx_ext.alignment import align_segment; print('import ok')"

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-macos-arm64-py${{ matrix.python-version }}
          path: dist/*.whl
          if-no-files-found: error

  release:
    name: Attach wheels to GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux-x86_64, macos-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List wheels
        run: ls -lh dist

      - name: Create / update Release and upload wheels
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          generate_release_notes: true
