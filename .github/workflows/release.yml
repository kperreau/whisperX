name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump (semver part to increment)"
        required: true
        default: patch
        type: choice
        options: [patch, minor, major]
      dry_run:
        description: "Dry run — compute the next version, build the wheels, but skip the commit / tag / release publish"
        required: false
        default: false
        type: boolean

permissions:
  contents: write  # bump commit, tag push, and Release publish all need this

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  bump:
    name: Bump version + tag
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.compute.outputs.new_version }}
      tag: ${{ steps.compute.outputs.tag }}
      sha: ${{ steps.commit.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.8.17"

      - name: Compute next version
        id: compute
        run: |
          set -euo pipefail
          current=$(python -c 'import tomllib;print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')
          IFS=. read -r MAJ MIN PAT <<<"$current"
          case "${{ inputs.bump }}" in
            patch) PAT=$((PAT + 1));;
            minor) MIN=$((MIN + 1)); PAT=0;;
            major) MAJ=$((MAJ + 1)); MIN=0; PAT=0;;
            *)     echo "unknown bump kind: ${{ inputs.bump }}"; exit 1;;
          esac
          new="${MAJ}.${MIN}.${PAT}"
          echo "current=$current"
          echo "new=$new"
          echo "new_version=$new" >> "$GITHUB_OUTPUT"
          echo "tag=v$new"        >> "$GITHUB_OUTPUT"

      - name: Update pyproject.toml + uv.lock
        env:
          NEW_VERSION: ${{ steps.compute.outputs.new_version }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import os, pathlib, re
          new = os.environ["NEW_VERSION"]
          p = pathlib.Path("pyproject.toml")
          s = p.read_text()
          s2, n = re.subn(r'^version\s*=\s*".+"', f'version = "{new}"', s, count=1, flags=re.M)
          assert n == 1, "could not find version line in pyproject.toml"
          p.write_text(s2)
          PY
          # Refresh the lockfile so [tool.uv] consumers see the bump.
          uv lock

      - name: Commit, tag, push
        id: commit
        if: ${{ !inputs.dry_run }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml uv.lock
          git commit -m "chore: release ${{ steps.compute.outputs.tag }}"
          git tag -a "${{ steps.compute.outputs.tag }}" -m "Release ${{ steps.compute.outputs.tag }}"
          git push origin HEAD:${{ github.ref_name }}
          git push origin "${{ steps.compute.outputs.tag }}"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Dry-run summary
        if: ${{ inputs.dry_run }}
        run: |
          echo "::notice::Dry run — would tag ${{ steps.compute.outputs.tag }} on $(git rev-parse HEAD)"

  linux-x86_64:
    name: Build linux-x86_64 (py${{ matrix.python-version }})
    needs: bump
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
        with:
          # When dry-running there is no tag yet; build from the workflow ref.
          ref: ${{ inputs.dry_run && github.ref || needs.bump.outputs.tag }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Build manylinux wheel
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64-unknown-linux-gnu
          manylinux: "2_28"
          args: --release --out dist --interpreter python${{ matrix.python-version }}

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-linux-x86_64-py${{ matrix.python-version }}
          path: dist/*.whl
          if-no-files-found: error

  macos-arm64:
    name: Build macos-arm64 (py${{ matrix.python-version }})
    needs: bump
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.dry_run && github.ref || needs.bump.outputs.tag }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Build macOS arm64 wheel
        uses: PyO3/maturin-action@v1
        with:
          target: aarch64-apple-darwin
          args: --release --out dist --interpreter python${{ matrix.python-version }}

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-macos-arm64-py${{ matrix.python-version }}
          path: dist/*.whl
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    if: ${{ !inputs.dry_run }}
    needs: [bump, linux-x86_64, macos-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List wheels
        run: ls -lh dist

      - name: Create Release and upload wheels
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump.outputs.tag }}
          name: ${{ needs.bump.outputs.tag }}
          target_commitish: ${{ needs.bump.outputs.sha }}
          generate_release_notes: true
          files: dist/*.whl
